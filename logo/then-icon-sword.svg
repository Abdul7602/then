<svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Icon background -->
  <rect width="400" height="400" fill="#0A0A0A" rx="88"/>

  <!-- ══════════════════════════════════════════
       HERALDIC SWORD — faithful to reference
       Solid white blade · X-wrap grip
       Bracket crossguard · Ring pommel
       ══════════════════════════════════════════ -->

  <!-- ── RING POMMEL ── -->
  <circle cx="200" cy="52" r="21"
          stroke="white" stroke-width="4.5" fill="#0A0A0A"/>
  <circle cx="200" cy="52" r="6.5"
          stroke="white" stroke-width="3" fill="#0A0A0A"/>

  <!-- Collar connecting ring to grip -->
  <rect x="191" y="70" width="18" height="7" rx="1" fill="white"/>

  <!-- ── GRIP (X-wrap leather binding) ── -->
  <!-- Grip body — solid white fill -->
  <path d="M188,76 L212,76 L213,148 L187,148 Z" fill="white"/>
  <!-- X-pattern wrap cuts (dark marks into white) -->
  <!-- Set 1: ↘ direction -->
  <line x1="188" y1="86"  x2="212" y2="108" stroke="#0A0A0A" stroke-width="3.8" stroke-linecap="butt"/>
  <line x1="188" y1="108" x2="212" y2="130" stroke="#0A0A0A" stroke-width="3.8" stroke-linecap="butt"/>
  <line x1="188" y1="128" x2="212" y2="148" stroke="#0A0A0A" stroke-width="3.8" stroke-linecap="butt"/>
  <!-- Set 2: ↙ direction -->
  <line x1="212" y1="86"  x2="188" y2="108" stroke="#0A0A0A" stroke-width="3.8" stroke-linecap="butt"/>
  <line x1="212" y1="108" x2="188" y2="130" stroke="#0A0A0A" stroke-width="3.8" stroke-linecap="butt"/>
  <line x1="212" y1="128" x2="188" y2="148" stroke="#0A0A0A" stroke-width="3.8" stroke-linecap="butt"/>
  <!-- Grip border outline (crisp edge) -->
  <path d="M188,76 L212,76 L213,148 L187,148 Z"
        stroke="white" stroke-width="1.8" fill="none"/>

  <!-- ── CROSSGUARD ── -->
  <!-- Left arm + downward bracket tip -->
  <path d="M100,150 L193,150 L193,174 L128,174 L128,184 L100,184 Z"
        fill="white"/>
  <!-- Right arm + downward bracket tip — mirror -->
  <path d="M207,150 L300,150 L300,184 L272,184 L272,174 L207,174 Z"
        fill="white"/>
  <!-- Left bracket hole -->
  <circle cx="114" cy="168" r="8" fill="#0A0A0A"/>
  <!-- Right bracket hole -->
  <circle cx="286" cy="168" r="8" fill="#0A0A0A"/>
  <!-- Thin inner groove lines (engraved detail on crossguard) -->
  <line x1="128" y1="156" x2="193" y2="156"
        stroke="#0A0A0A" stroke-width="1.5" opacity="0.2"/>
  <line x1="207" y1="156" x2="272" y2="156"
        stroke="#0A0A0A" stroke-width="1.5" opacity="0.2"/>

  <!-- ── BLADE (solid white, double-edged profile) ── -->
  <!-- Main blade body -->
  <path d="M193,174 C191,234 189,296 200,375
           C211,296 209,234 207,174 Z"
        fill="white"/>
  <!-- Left edge definition line -->
  <path d="M193,180 C191,238 189,298 200,370"
        stroke="#0A0A0A" stroke-width="2" fill="none" opacity="0.18"/>
  <!-- Right edge definition line -->
  <path d="M207,180 C209,238 211,298 200,370"
        stroke="#0A0A0A" stroke-width="2" fill="none" opacity="0.18"/>
  <!-- Fuller / bright reflection (right of center — catching light) -->
  <path d="M203,182 C203,240 202,298 200,368"
        stroke="white" stroke-width="3" fill="none" opacity="0.65"/>
  <!-- Battle scratch marks (character detail) -->
  <line x1="203" y1="248" x2="195" y2="280"
        stroke="#0A0A0A" stroke-width="2" opacity="0.3"/>
  <line x1="203" y1="316" x2="196" y2="348"
        stroke="#0A0A0A" stroke-width="2" opacity="0.3"/>

</svg>
