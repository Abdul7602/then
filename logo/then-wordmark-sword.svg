<svg viewBox="0 0 680 200" fill="none" xmlns="http://www.w3.org/2000/svg">

  <rect width="680" height="200" fill="#0A0A0A"/>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&amp;display=swap');
    </style>
  </defs>

  <!-- ══════════════════════════════════════════
       SWORD T — same shapes as icon, scaled
       Cap line: y=46  |  Baseline: y=158  |  Grip height: 112px
       Center: x=56
       ══════════════════════════════════════════ -->

  <!-- BLADE — above cap line -->
  <path d="M56 22 L62 44 L56 47 L50 44 Z" fill="white"/>

  <!-- Blade fuller -->
  <line x1="56" y1="26" x2="56" y2="43" stroke="#0A0A0A" stroke-width="1.4" opacity="0.22"/>

  <!-- CROSSGUARD — clean horizontal bar -->
  <rect x="14" y="44" width="84" height="10" rx="2.5" fill="white"/>

  <!-- Riccasso notch -->
  <rect x="51" y="44" width="10" height="4.5" rx="1" fill="#0A0A0A" opacity="0.18"/>

  <!-- GRIP — cap line to baseline -->
  <rect x="51.5" y="57" width="9" height="101" rx="2" fill="white"/>

  <!-- POMMEL -->
  <circle cx="56" cy="173" r="13"  fill="white"/>
  <circle cx="56" cy="173" r="8"   fill="#0A0A0A"/>
  <circle cx="56" cy="173" r="3.5" fill="white"/>

  <!-- ══════════════════════════════════════════
       "hen" — Cormorant Garamond 300
       Baseline: y=158, sized to match 112px cap height
       ══════════════════════════════════════════ -->
  <text
    x="108"
    y="158"
    fill="white"
    font-family="'Cormorant Garamond', 'Palatino Linotype', Palatino, Georgia, serif"
    font-size="116"
    font-weight="300"
    letter-spacing="-2"
  >hen</text>

</svg>
